version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gestorCOPEREX-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestorCOPEREXDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: